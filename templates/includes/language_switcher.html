{% load i18n %}
<form action="{% url 'set_language' %}" method="post" class="language-switcher">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.get_full_path }}">
    <button type="submit" name="language" value="zh-hans" class="language-option{% if LANGUAGE_CODE == 'zh-hans' %} is-active{% endif %}">中文</button>
    <span class="language-divider" aria-hidden="true">|</span>
    <button type="submit" name="language" value="en" class="language-option{% if LANGUAGE_CODE == 'en' %} is-active{% endif %}">EN</button>
</form>
